<div>
    <label for="slider">Anzahl Wiederholungen:</label>
    <input type="range" id="anzahl_wiederholungen" min="1" max="10" [value]="anzahl_wiederholungen" title="Anzahl Wiederholungen">
    <span id="slider_value">3</span>
</div>
<div>
    <input type="file" id="file_input" accept=".csv" title="CSV-Datei mit Vokabeln (Format: Wort;Übersetzung)" (change)="onFileSelected($event)">
</div>
