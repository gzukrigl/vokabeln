<html>
  <head>
     <title>Vokabeln</title>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="lib/jquery.min.js"></script>
        <link rel="stylesheet" href="main.css">
     <script>
        function input_is_ok(input_text, correct_answer) {
            // Hilfsfunktionen zur Normalisierung und Variantenbildung
            function normalizeText(text) {
                return text.replace(/\s+/g, " ").trim();
            }

            function stripToPrefix(text) {
                const normalized = normalizeText(text);
                return normalized.toLowerCase().startsWith("to ") ? normalized.substring(3).trim() : normalized;
            }

            function expandParenthesesVariants(text) {
                const start = text.indexOf("(");
                if (start === -1) {
                    return [normalizeText(text)];
                }
                const end = text.indexOf(")", start);
                if (end === -1) {
                    return [normalizeText(text)];
                }

                const prefix = text.slice(0, start);
                const optional = text.slice(start + 1, end);
                const suffix = text.slice(end + 1);

                const withOption = normalizeText(prefix + optional + suffix);
                const withoutOption = normalizeText(prefix + suffix);

                return [
                    ...expandParenthesesVariants(withOption),
                    ...expandParenthesesVariants(withoutOption)
                ];
            }

            function expandSlashVariants(text) {
                const tokens = normalizeText(text).split(" ");
                let variants = [[]];
                for (const token of tokens) {
                    const alternatives = token.split("/");
                    const nextVariants = [];
                    for (const variant of variants) {
                        for (const alt of alternatives) {
                            nextVariants.push([...variant, alt]);
                        }
                    }
                    variants = nextVariants;
                }
                return variants.map(parts => normalizeText(parts.join(" ")));
            }

            function expandAnswerVariants(answer) {
                const parenthesisVariants = expandParenthesesVariants(answer);
                const expanded = new Set();
                for (const variant of parenthesisVariants) {
                    for (const slashVariant of expandSlashVariants(variant)) {
                        expanded.add(slashVariant);
                    }
                }
                return Array.from(expanded);
            }

            const inputStripped = stripToPrefix(input_text);
            const answerBlocks = correct_answer.split(",");

            for (let i = 0; i < answerBlocks.length; i++) {
                const block = answerBlocks[i].trim();
                const variants = expandAnswerVariants(block);
                for (const variant of variants) {
                    const variantStripped = stripToPrefix(variant);
                    if (inputStripped.toLowerCase() === variantStripped.toLowerCase()) {
                        return inputStripped === variantStripped ? "correct" : "warning";
                    }
                }
            }
            return "wrong";
        }

        function test_input_is_ok() {
            const tests = [
                { input: "Katze", answer: "Katze", expected: "correct" },
                { input: "cat", answer: "Katze, cat, Katze", expected: "correct" },
                { input: "Katze", answer: "Katze, cat, Katze", expected: "correct" },
                { input: "Katze", answer: "Katze, Hund, Katze", expected: "correct" },
                { input: "Hund", answer: "Katze, Hund, Katze", expected: "correct" },
                { input: "to speak", answer: "to talk, to speak", expected: "correct" },
                { input: "laufen", answer: "laufen, to run", expected: "correct" },
                { input: "Clemens", answer: "Gerald", expected: "wrong" },
                { input: "kaTze", answer: "Katze", expected: "warning" },
                { input: "kaTze", answer: "Hund, Katze", expected: "warning" },
                { input: "unterhalten", answer: "(sich) unterhalten", expected: "correct" },
                { input: "sich unterhalten", answer: "(sich) unterhalten", expected: "correct" },
                { input: "Unterhalten", answer: "(sich) unterhalten", expected: "warning" },
                { input: "sich Unterhalten", answer: "(sich) unterhalten", expected: "warning" },
                { input: "laufen", answer: "(sich) unterhalten", expected: "wrong" },
                { input: "sich verlaufen", answer: "sich verirren/verlaufen", expected: "correct" },
                { input: "sich verirren", answer: "sich verirren/verlaufen", expected: "correct" },
                { input: "Sich verlaufen", answer: "sich verirren/verlaufen", expected: "warning" },
                { input: "sich verlor", answer: "sich verirren/verlaufen", expected: "wrong" },
                { input: "verlaufen", answer: "(sich) verirren/verlaufen", expected: "correct" },
                { input: "sich verlaufen", answer: "(sich) verirren/verlaufen", expected: "correct" },
                { input: "verirren", answer: "(sich) verirren/verlaufen", expected: "correct" },
                { input: "Sich Verirren", answer: "(sich) verirren/verlaufen", expected: "warning" },
                { input: "sich verfährt", answer: "(sich) verirren/verlaufen", expected: "wrong" },
                { input: "fortlaufen", answer: "(sich) verirren/verlaufen, weglaufen/fortlaufen", expected: "correct" },
                { input: "sich verlaufen", answer: "(sich) verirren/verlaufen, weglaufen/fortlaufen", expected: "correct" },
                { input: "Weglaufen", answer: "(sich) verirren/verlaufen, weglaufen/fortlaufen", expected: "warning" },
                { input: "sich verbringen", answer: "(sich) verirren/verlaufen, weglaufen/fortlaufen", expected: "wrong" }
            ];

            let failed = 0;
            for (const test of tests) {
                const result = input_is_ok(test.input, test.answer);
                const passed = result === test.expected;
                if (!passed) {
                    failed += 1;
                    console.log(`${passed ? "PASS" : "FAIL"}: input='${test.input}' answer='${test.answer}' expected='${test.expected}' got='${result}'`);

                }
            }
            if (failed > 0) {
                console.error(`test_input_is_ok: ${failed} failed test(s)`);
            } else {
                console.log("test_input_is_ok: all tests passed");
            }
        }   

        function are_all_words_identical(vokabeln) {
            if (vokabeln.length == 0) {
                return false;
            }
            const first_word = vokabeln[0].word;
            for (let i = 1; i < vokabeln.length; i++) {
                if (vokabeln[i].word !== first_word) {
                    return false;
                }
            }
            return true;
        }
        
        function test_are_all_words_identical() {
            console.log(are_all_words_identical([{word: "Katze", translation: "cat"}])); // true
            console.log(are_all_words_identical([{word: "Katze", translation: "cat"}, {word: "Katze", translation: "cat"}])); // true
            console.log(are_all_words_identical([{word: "Katze", translation: "cat"}, {word: "Hund", translation: "dog"}])); // false
            console.log(are_all_words_identical([])); // false
        }

        function proceed_to_next_word(latest_word, vokabeln) {
            if (vokabeln.length == 0) {
                $('#firework').show();
                anzahl_alle_vokabeln = 0;
                i = 0;
                adjust_progress_bar();
                $('#vokabeln_form').hide();
                setTimeout(function() {
                    $('#firework').hide();
                }, 5000);
                $('#file_input').val('')
                $('#start_panel').show();
            } else {
                do {
                    i = Math.floor(Math.random() * vokabeln.length);
                } while (vokabeln[i].word == latest_word && !are_all_words_identical(vokabeln));
                $('#translation_input').val("");
                $('#word_output').val(vokabeln[i].word);
                $('#vokabeln_form').show();
            }        
            $('#error_message').hide();
            $('#translation_input').focus();
            adjust_progress_bar();
            return i;
        }
        var latest_word = "";

        function adjust_progress_bar() {
            $('#progress_bar').attr('value', anzahl_alle_vokabeln - vokabeln.length);
            $('#progress_value').text(anzahl_alle_vokabeln - vokabeln.length);
            $('#progress_bar').attr('max', anzahl_alle_vokabeln);
            $('#total_value').text(anzahl_alle_vokabeln);
        }

        $(document).ready(function(){
            test_input_is_ok();
            vokabeln = [];
            anzahl_alle_vokabeln = 0;
            i = 0;
            $('#vokabeln_form').hide();
            $('#firework').hide();
            $('#error_message').hide();
            $('#warning_row').hide();

            $('#check').click(function(event){
                event.preventDefault();
                $('#warning_row').hide();
                var input = jQuery('#translation_input').val();
                latest_word = vokabeln[i].word;
                switch(input_is_ok(input.trim(), vokabeln[i].translation)) {
                    case "correct":
                        vokabeln.splice(i,1);
                        console.log(vokabeln);
                        i = proceed_to_next_word(latest_word, vokabeln);
                        break;
                    case "warning":
                        vokabeln.splice(i,1);
                        console.log(vokabeln);
                        i = proceed_to_next_word(latest_word, vokabeln);
                        $('#warning_row').show();
                        break;
                    case "wrong":
                        vokabeln.push(vokabeln[i]);
                        $('#vokabeln_form').hide();
                        $('#error_message_text').text("Falsch! Die richtige Antwort ist: " + vokabeln[i].translation);
                        $('#error_message').show();
                        $('#error_message_ok').focus();
                        anzahl_alle_vokabeln++;
                        adjust_progress_bar();
                        break;
                }
            }); 

            $('#teach_button').click(function(event) {
                event.preventDefault();
                $('#translation_input').hide();
                $('#learn_value').show();
                $('#learn_value').text(vokabeln[i].translation);
                $('#teach_button').hide();
                $('#check').hide();
                $('#continue').show().focus();
            });

            $('#continue').click(function(event) {
                event.preventDefault();
                $('#translation_input').show();
                $('#learn_value').hide();
                $('#teach_button').show();
                $('#check').show();
                $('#continue').hide();
                $('#learn_value').hide();
                i = proceed_to_next_word(latest_word, vokabeln);
            });

            $('#false_error_message').click(function(event){
                event.preventDefault();
                vokabeln.splice(i,1);
                vokabeln.splice(vokabeln.length-1,1);
                anzahl_alle_vokabeln -= 1;
                i = proceed_to_next_word(latest_word, vokabeln);
            });
            
            $('#error_message_ok').click(function(event){
                event.preventDefault();
                i = proceed_to_next_word(latest_word, vokabeln);
            });

            $('#file_input').on('change', function(event) {
                const file = event.target.files[0]; // Die hochgeladene Datei
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const csvContent = e.target.result;
                    
                            vokabeln = [];
                            einzelne_vokabeln = [];
                            const rows = csvContent.split('\n');
                            rows.forEach(row => {
                                const [word, translation] = row.split(';'); // Spalten aufteilen
                                if (word && translation && word != "" && translation != "") { // Nur gültige Zeilen verarbeiten
                                    einzelne_vokabeln.push({ word: word.trim(), translation: translation.trim() });
                                }
                            });
                        
                            anzahl_wiederholungen = $('#anzahl_wiederholungen').val();
                            console.log("Anzahl Wiederholungen:", anzahl_wiederholungen);
                            einzelne_vokabeln.forEach(element => {
                                for (let i = 0; i < anzahl_wiederholungen; i++) {
                                    vokabeln.push(element);
                                    vokabeln.push({word: element.translation, translation: element.word});
                                }
                            })

                            console.log("Vokabeln geladen:", vokabeln);
                            i = Math.floor(Math.random() * vokabeln.length);
                            jQuery('#translation_input').val("");
                            jQuery('#word_output').val(vokabeln[i].word);
                            $('#vokabeln_form').show();
                            $('#learn_button').show();
                            $('#continue').hide();
                            $('#start_panel').hide();
                            $('#learn_value').hide();
                            $('#progress_bar').attr('max', vokabeln.length);
                            anzahl_alle_vokabeln = vokabeln.length;
                            $('#total_value').text(anzahl_alle_vokabeln);
                        } catch (error) {
                            alert("Fehler beim Laden der Datei: " + error.message);
                        }
                    };
                    reader.readAsText(file); // Datei als Text lesen‚
                }
            });

            $(document).ready(function() {
                $('#anzahl_wiederholungen').on('input', function() {
                    $('#slider_value').text($(this).val()); // Aktualisiert den Wert in Echtzeit
                });
            });
        });
        </script>
  </head>
  <body>
    <h1>Vokabeln</h1>
    <div id ="start_panel">
        <div>
            <label for="slider">Anzahl Wiederholungen:</label>
            <input type="range" id="anzahl_wiederholungen" min="1" max="10" value="3" title="Anzahl Wiederholungen">
            <span id="slider_value">3</span>
        </div>
        <div>
            <input type="file" id="file_input" accept=".csv" title="CSV-Datei mit Vokabeln (Format: Wort;Übersetzung)">
        </div>
    </div>

    <form id="vokabeln_form">
        <table id="vokabeln_table" style="border: 1px solid black; margin: 1px; padding: 0px;">
            <tr>
                <td colspan="2">
                    <progress id="progress_bar" value="0" max="100" style="width: 80%; height: 20px;">
                    </progress>
                    <span id="progress_text">Fortschritt: <span id="progress_value">0</span> von <span id="total_value">0</span></span>
                </td>
            </tr>
            <tr id="warning_row">
                <td colspan="2">
                    <span id="warning_text">Bitte achte auf Gro&szlig;-/Kleinschreibung</span>
                </td>
            </tr>
            <tr>
                <td>Vokabel</td>
                <td><input title="output" id="word_output" type="text" readonly value="cat"></td>
            </tr>
            <tr>
                <td>Übersetzung</td>
                <td>
                    <input title="input" id="translation_input" type="text" value="">
                    <span id="learn_value">Hier kommt der Lernmodus-Ausgaben-Text hin.</span>
                    <input title="button" id="teach_button" type="button" value="Lernen">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button id="check">Check</button>
                    <button id="continue">Weiter</button>
                </td>

            </tr>
        </table>
        
    </form>
    <img src="feuerwerk.gif" id="firework" alt="Feuerwehr um das Fertigstellen zu feiern">
    <div id="error_message">
        <div id="error_message_text">Blödmann!</div>
        <button id="error_message_ok">Weiter</button>
        <button id="false_error_message">Stimmt doch</button>
    </div>
  </body>
</html>
